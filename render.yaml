services:
  # Servicio Web principal — Backend FastAPI + Frontend estático servido por backend
  - type: web
    name: metanosrgan-elite-v55
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: JWT_REFRESH_DAYS
        value: "7"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SIMULATE_ALERTS
        value: "false"
      - key: ELITE_SCORE_THRESHOLD
        value: "50"
      - key: BREVO_API_KEY
        sync: false

  # Bot Telegram (Background Worker) — opcional pero recomendado
  - type: worker
    name: metanosrgan-telegram-bot
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python telegram_bot/metano_alerts_bot_v40.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
