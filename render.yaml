services:
  - type: web
    name: ie-valdivia-portal
    runtime: python
    plan: free
    region: oregon
    rootDir: .
    buildCommand: ./build.sh
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: 20.11.0
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: ievaldivia
      - key: ADMIN_PASSWORD
        value: "12"
