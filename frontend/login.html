<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — MetanoSRGAN Elite v5.5</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --green: #00ff88;
    --red: #ff2244;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at top, #0d1b2e 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at top, #0d1b2e 0%, var(--bg) 60%),
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="1" cy="1" r="1" fill="%231e3a5f" opacity="0.4"/></svg>');
  }
  .login-container {
    background: linear-gradient(135deg, #0d1b2e 0%, #0a1628 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0, 212, 255, 0.18), 0 0 80px rgba(0, 212, 255, 0.06);
    position: relative;
    overflow: hidden;
  }
  .login-container::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--green), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 0 0; } 100% { background-position: 200% 0; } }
  .logo {
    font-size: 28px; font-weight: 900; color: var(--accent);
    letter-spacing: -0.5px; margin-bottom: 4px;
  }
  .logo span { color: var(--green); }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
  .badge {
    display: inline-block; background: rgba(0, 212, 255, 0.12);
    color: var(--accent); padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 700; margin-left: 8px;
    border: 1px solid rgba(0, 212, 255, 0.3);
  }
  .form-group { margin-bottom: 20px; }
  label {
    display: block; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--muted); margin-bottom: 8px;
  }
  input[type="text"], input[type="password"] {
    width: 100%; background: rgba(10, 14, 26, 0.7);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; color: var(--text);
    font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.18);
  }
  .btn {
    width: 100%; background: linear-gradient(135deg, var(--accent), #0095bb);
    color: #001a26; border: none; border-radius: 8px;
    padding: 14px; font-size: 15px; font-weight: 800;
    cursor: pointer; text-transform: uppercase;
    letter-spacing: 0.8px; transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .alert {
    padding: 12px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .alert.error { background: rgba(255, 34, 68, 0.1); color: var(--red);
                  border: 1px solid rgba(255, 34, 68, 0.3); }
  .alert.success { background: rgba(0, 255, 136, 0.1); color: var(--green);
                   border: 1px solid rgba(0, 255, 136, 0.3); }
  .footer {
    margin-top: 24px; text-align: center;
    color: var(--muted); font-size: 11px;
  }
  .footer a { color: var(--accent); text-decoration: none; }
  .helper {
    background: rgba(0, 212, 255, 0.04); border-left: 3px solid var(--accent);
    padding: 10px 12px; border-radius: 4px;
    font-size: 12px; color: var(--muted); margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">Metano<span>SRGAN</span> Elite <span class="badge">v5.5</span></div>
  <div class="subtitle">Plataforma Geoespacial — Detección de Metano 24/7</div>

  <div class="alert error" id="err" data-testid="login-error"></div>
  <div class="alert success" id="ok" data-testid="login-success"></div>

  <form id="loginForm" data-testid="login-form">
    <div class="form-group">
      <label for="username">Usuario o Correo Corporativo</label>
      <input type="text" id="username" name="username" required autocomplete="username"
             placeholder="usuario@empresa.com" data-testid="login-username-input" />
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required autocomplete="current-password"
             placeholder="••••••••" data-testid="login-password-input" />
    </div>
    <button type="submit" class="btn" id="btn" data-testid="login-submit-btn">Ingresar</button>
  </form>

  <div class="footer">
    Acceso por invitación · ¿Problemas? Contacta a tu administrador
    &nbsp;·&nbsp;
    <a href="/api/docs" data-testid="api-docs-link" style="color:var(--muted)">API</a>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const errEl = document.getElementById('err');
const okEl = document.getElementById('ok');
const btn = document.getElementById('btn');

function showError(msg) {
  errEl.textContent = msg; errEl.style.display = 'block';
  okEl.style.display = 'none';
}
function showOk(msg) {
  okEl.textContent = msg; okEl.style.display = 'block';
  errEl.style.display = 'none';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.style.display = 'none'; okEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Autenticando...';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Credenciales inválidas');
    localStorage.setItem('msr_token', data.access_token);
    localStorage.setItem('msr_refresh', data.refresh_token || '');
    localStorage.setItem('msr_user', JSON.stringify(data.user || {}));
    showOk('✓ Bienvenido ' + (data.user?.full_name || data.user?.username || ''));
    setTimeout(() => {
      const role = data.user?.role || 'viewer';
      window.location.href = role === 'admin' ? '/admin' : '/app';
    }, 600);
  } catch (e) {
    showError(e.message || 'Error de autenticación');
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
});

// Auto-redirect si ya hay sesión
if (localStorage.getItem('msr_token')) {
  fetch('/api/user/profile', {
    headers: {Authorization: 'Bearer ' + localStorage.getItem('msr_token')}
  }).then(r => r.ok ? r.json() : null).then(p => {
    if (p) window.location.href = p.role === 'admin' ? '/admin' : '/app';
  }).catch(() => {});
}
</script>
</body>
</html>
